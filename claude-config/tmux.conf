# Scrollback history
set -g history-limit 200000

# Mouse support (scroll, click to select pane/window)
set -g mouse on

# Vi keys in copy mode
setw -g mode-keys vi

# Start window and pane indices at 1 (easier keyboard reach)
set -g base-index 1
setw -g pane-base-index 1

# Reduce escape delay for vim/neovim
set -sg escape-time 10

# True colour
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Status bar
set -g status-right '%H:%M %d-%b-%y'

services:
  # Minimal: Claude Code only, fast build
  ai-agent-lite:
    build:
      context: .
      target: lite
    image: ai-agent:lite
    container_name: ai-agent-lite
    stdin_open: true
    tty: true
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/workspace
      - ai-agent-claude:/home/agent/.claude
      - ai-agent-config:/home/agent/.config
    working_dir: /workspace

  # Full dev environment: Go, GitHub CLI, MCP servers, AI tools
  ai-agent:
    build:
      context: .
      target: base
    image: ai-agent:latest
    container_name: ai-agent
    stdin_open: true
    tty: true
    # NET_ADMIN + NET_RAW enable optional iptables-based network isolation
    # (allowlist outbound traffic to GitHub, npm, PyPI, etc. for untrusted repos)
    cap_add: [NET_ADMIN, NET_RAW]
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/workspace
      - ai-agent-claude:/home/agent/.claude
      - ai-agent-config:/home/agent/.config
    working_dir: /workspace

  # Full variant with browser automation
  ai-agent-browsing:
    build:
      context: .
      target: browsing
    image: ai-agent:browsing
    container_name: ai-agent-browsing
    stdin_open: true
    tty: true
    cap_add: [NET_ADMIN, NET_RAW]
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/workspace
      - ai-agent-claude:/home/agent/.claude
      - ai-agent-config:/home/agent/.config
    working_dir: /workspace

volumes:
  ai-agent-claude:
    name: ai-agent-claude
  ai-agent-config:
    name: ai-agent-config

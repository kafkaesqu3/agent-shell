services:
  ai-agent:
    build:
      context: .
      target: base
    image: ai-agent:latest
    container_name: ai-agent
    stdin_open: true
    tty: true
    env_file:
      - path: .env
        required: false
    volumes:
      # Mount current directory to /workspace
      - .:/workspace
      # Persistent Claude Code state (credentials, history, settings)
      - ai-agent-claude:/home/agent/.claude
      # Persistent AI tool configurations
      - ai-agent-config:/home/agent/.config
    working_dir: /workspace

  # Full variant with browser automation
  ai-agent-browsing:
    build:
      context: .
      target: browsing
    image: ai-agent-browsing:latest
    container_name: ai-agent-browsing
    stdin_open: true
    tty: true
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/workspace
      - ai-agent-claude:/home/agent/.claude
      - ai-agent-config:/home/agent/.config
    working_dir: /workspace

volumes:
  ai-agent-claude:
    name: ai-agent-claude
  ai-agent-config:
    name: ai-agent-config
